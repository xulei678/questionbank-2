let questions=[...ALL_QUESTIONS], current=0, answers={}, wrongIds=new Set();
const el=id=>document.getElementById(id); const total=()=>questions.length;
el('totalTop').textContent=ALL_QUESTIONS.length;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function render(){
  el('summaryCard').classList.add('hidden'); el('quizCard').classList.remove('hidden');
  const q=questions[current]; const chosen=answers[q.id];
  el('counter').textContent='第 '+(current+1)+' / '+total()+' 题';
  el('scoreText').textContent='已答 '+Object.keys(answers).length+' 题｜正确 '+Object.values(answers).filter(x=>x.correct).length+' 题';
  el('progress').style.width=((current+1)/total()*100)+'%';
  const stemText=[q.group,q.stem].filter(Boolean).join('
');
  el('stem').textContent=stemText; el('stem').classList.toggle('hidden', !stemText);
  el('question').textContent=q.id+'. '+q.question;
  el('options').innerHTML='';
  q.options.forEach(o=>{const b=document.createElement('button'); b.className='option'; b.innerHTML='<span class="label">'+o.label+'</span><span>'+o.text+'</span>'; b.onclick=()=>choose(o.label); if(chosen){b.classList.add('disabled'); if(o.label===q.answer)b.classList.add('correct'); if(o.label===chosen.choice && !chosen.correct)b.classList.add('wrong');} el('options').appendChild(b);});
  const r=el('result'); r.className='result'; r.textContent='';
  if(chosen){r.classList.add(chosen.correct?'ok':'bad'); r.textContent=chosen.correct?'✅ 回答正确':'❌ 回答错误，正确答案：'+q.answer;}
  el('prevBtn').disabled=current===0; el('nextBtn').textContent=current===total()-1?'看成绩':'下一题';
}
function choose(label){const q=questions[current]; const correct=label===q.answer; answers[q.id]={choice:label, correct}; if(!correct)wrongIds.add(q.id); else wrongIds.delete(q.id); render();}
function prevQ(){if(current>0){current--;render();}}
function nextQ(){if(current<total()-1){current++;render();}else showSummary();}
function showSummary(){el('quizCard').classList.add('hidden'); el('summaryCard').classList.remove('hidden'); const right=Object.values(answers).filter(x=>x.correct).length; const answered=Object.keys(answers).length; const wrong=answered-right; el('sumScore').textContent=right; el('sumWrong').textContent=wrong; el('sumRate').textContent=answered?Math.round(right/answered*100)+'%':'0%'; const box=el('wrongList'); box.innerHTML='<h3>错题回顾</h3>'; const wrongQs=ALL_QUESTIONS.filter(q=>wrongIds.has(q.id)); if(!wrongQs.length){box.innerHTML+='<p style="color:#16a34a;font-weight:700">暂无错题。</p>';return;} wrongQs.forEach(q=>{const d=document.createElement('div'); d.className='wrong-item'; d.innerHTML='<div><b>第'+q.id+'题</b> 正确答案：'+q.answer+'</div><div style="margin-top:6px">'+q.question+'</div>'; box.appendChild(d);});}
function restart(random){questions=[...ALL_QUESTIONS]; if(random)shuffle(questions); current=0; answers={}; wrongIds=new Set(); render();}
function reviewWrong(){const wrongQs=ALL_QUESTIONS.filter(q=>wrongIds.has(q.id)); if(!wrongQs.length)return; questions=wrongQs; current=0; answers={}; wrongIds=new Set(); render();}
